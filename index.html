    <script>
        //string - jest do manipulowania łańcuchami znaków
        //łańcuch znaków (to samo co var w sql) - liczba liter w słowie


        //.length - wypisuje ilość liter
        var tekst="Witaj Świecie!"; 
        document.write(tekst.length); 

        //string.charAt(index) – Zwraca znak znajdujący się na wskazanej pozycji. Indeks pierwszego 
        //znaku to 0, a indeks ostatniego to długość łańcucha – 1.

        //.charAt(index) - piszę który znak w kolei ma mi pokazać, i go pokazuje
    
        //Wypisanie pierszego, ostatniego i 8 znaku z łańcucha znaków. 
        var tekst="Witaj Świecie!"; 
        document.write(tekst.charAt(0)+" "+tekst.charAt(tekst.lenght-1)+" "+tekst.charAt(7));
        
        //Utwórz formularz składający się z dwóch pól tekstowych oraz jednego przycisku. Zadaniem 
        //formularza będzie odwracanie łańcuchów znaków. 
        function odwroc(tekst) { 
        var odwrocenie = "jablko"; 
        for(i=tekst.length-1;i>=0;i--) { //dla i równego długości tekstu - 1, i dla i większego lub równego zero ma odjąć 1 od i
        odwrocenie += tekst.charAt(i);
        } 
        return odwrocenie; 
        }

        
    </script>
